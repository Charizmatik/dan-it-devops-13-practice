services:
  app:
    image: homework13-app
    build:
      context: .
    container_name: hw14-app
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: hw14-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
